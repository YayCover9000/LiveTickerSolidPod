# fly.toml app configuration file generated for livetickersolidpod on 2026-05-06T17:25:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'livetickersolidpod'
primary_region = 'fra'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
